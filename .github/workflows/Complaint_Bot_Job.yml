name: Complaint Bot Job

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          
      - name: Ensure model exists
        run: python '/Intermediate/Day 51 - Complaint Bot/download_model.py'

      - name: Cache model
        uses: actions/cache@v4
        with:
          path: model/
          key: gguf-model-v1

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Install Xvfb
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: Run bot with display
        run: |
          Xvfb :99 -screen 0 1920x1080x24 &
          export DISPLAY=:99
          python '/Intermediate/Day 51 - Complaint Bot/down_detector.py'
