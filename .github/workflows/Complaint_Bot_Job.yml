name: Complaint Bot Job

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    env:
      DISPLAY: ":99"  # ✅ Set at job level so ALL steps inherit it

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache model
        uses: actions/cache@v4
        with:
          path: model/
          key: gguf-model-v2

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Ensure model exists
        run: python 'Intermediate/Day 51 - Complaint Bot/download_model.py'

      - name: Install Chrome + Xvfb
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb google-chrome-stable

      - name: Start Xvfb
        run: |
          Xvfb :99 -screen 0 1920x1080x24 &
          sleep 2  # Give it time to initialise

      - name: Check Chrome version  # ✅ So you know what to set version_main to
        run: google-chrome --version

      - name: Run bot
        run: python 'Intermediate/Day 51 - Complaint Bot/down_detector.py'